<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <h1>🎨Modern Background Color Changer</h1>
        <div id="btns">
            <button onclick="red()" id="redbtn">Red</button>
            <button onclick="green()" id="greenbtn">Green</button>
            <button onclick="blue()" id="bluebtn">Blue</button>
            <button onclick="purple()" id="purplebtn">Purple</button>
            <button onclick="orange()" id="orangebtn">Orange</button>
            <button onclick="pink()" id="pinkbtn">Pink</button>
            <button onclick="sky()" id="skybtn">Sky</button>
            <button onclick="white()">White</button>
            <button onclick="darklinear()">Linear Dark</button>
            <button onclick="lightlinear()">Linear Light</button>
            <button onclick="resetBtn()">Reset</button>
        </div>

    </div>
    <script src="./app.js"></script>
</body>

</html>
